{{- if .Site.Params.DecapCMS.development -}}
# Development mode configuration
backend:
  name: test-repo
local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts:
    - "127.0.0.1"
{{ else }}
# Production mode configuration
backend:
  name: git-gateway
  branch: {{ .Site.Params.DecapCMS.branch }}
  commit_messages:
    create: Create {{ "{{collection}} “{{slug}}” " }}
    update: Update {{ "{{collection}} “{{slug}}” " }}
    delete: Delete {{ "{{collection}} “{{slug}}” " }}
    uploadMedia: Upload “{{ "{{path}}" }}”
    deleteMedia: Delete “{{ "{{path}}" }}”
    openAuthoring: '{{ "{{message}}" }}'
{{- end -}}

# Folder for storing media files
media_folder: "{{ .Site.Params.DecapCMS.media }}"
# Public URL path for accessing media files
public_folder: "{{ .Site.Params.DecapCMS.public }}"
# Publish mode for content (e.g., editorial workflow)
publish_mode: {{ .Site.Params.DecapCMS.PublishMode }}
# URL of the deployed site
site_url: "{{ .Site.BaseURL }}"
# Display URL for the site
display_url: "{{ .Site.BaseURL }}"
{{- if isset .Site.Params.DecapCMS "logo" -}}
# Custom Site Logo URL
logo_url: "{{ .Site.Params.DecapCMS.logo }}"
{{ end }}
# Show preview links in the CMS
show_preview_links: {{ .Site.Params.DecapCMS.preview }}
# Disable search for faster rendering
search: {{ .Site.Params.DecapCMS.search }}

view_filters:
  - label: 'Drafts'
    field: draft
    pattern: 'true'
    description: 'Show only draft posts.'

  - label: 'Published'
    field: draft
    pattern: 'false'
    description: 'Show only published posts.'

view_groups:
  - label: 'Year'
    field: date
    pattern: '\d{4}'
    description: 'Group posts by year based on the date field.'
  - label: 'Month'
    field: date
    pattern: '\d{4}-\d{2}'
    description: 'Group posts by month based on the date field.'

collections:
   # Decap Cms Settings
  - label: "Decap Config"
    name: "Decap Config"
    editor:
      preview: false
    files:
      - label: "Parameters"
        name: "params"
        file: "config/_default/params.toml"
        fields:
          - label: Decap CMS
            name: DecapCMS
            widget: object
            fields:
              - { 
                  label: "Development", 
                  name: "development", 
                  widget: "boolean", 
                  required: true , 
                  default: false , 
                  hint: "Enable this only for development purposes. It should remain off in production." 
                }
              - { 
                  label: "Branch", 
                  name: "branch", 
                  widget: "string", 
                  required: false , 
                  default: "main", 
                  hint: "Specify the branch name for your Git repository where content is managed. Default is 'main'." 
                }
              - { 
                  label: "Media Folder", 
                  name: "media", 
                  widget: "string", 
                  required: true , 
                  default: "/static/media", 
                  hint: "Define the folder path where media files are stored. This path is relative to the root of your project."
                }
              - { 
                  label: "Public Folder", 
                  name: "public", 
                  widget: "string", 
                  required: true , 
                  default: "/media", 
                  hint: "Specify the public URL path for accessing media files. This is relative to your site’s base URL."
                }
              - { 
                  label: "Publish Mode", 
                  name: "PublishMode", 
                  widget: "select", 
                  options: ["editorial_workflow", "default"], 
                  required: true, 
                  default: "default", 
                  hint: "Choose the publishing mode for content. 'Editorial Workflow' requires content to be reviewed before publishing." 
                }
              - { 
                  label: "Custom Logo", 
                  name: "logo", 
                  widget: "string", 
                  required: false, 
                  hint: Set Custom Logo for DecapCMS Login Page
                }
              - { 
                  label: "Show Preview links", 
                  name: "preview", 
                  widget: "boolean", 
                  required: true , 
                  default: true, 
                  hint: "Toggle this to enable or disable preview links in the CMS. Preview links help review changes before they go live." 
                }
              - { 
                  label: "Enable Search", 
                  name: "search", 
                  widget: "boolean", 
                  required: false , 
                  default: true, 
                  hint: "Enables Search functionality In DecapCMS UI. Disable if search is not needed." 
                }
              - { 
                  label: "Enable Cheatsheets", 
                  name: "Cheatsheets", 
                  widget: "boolean", 
                  required: false , 
                  default: true}
              - { 
                  label: "Enable Tutorials", 
                  name: "Tutorials", 
                  widget: "boolean", 
                  required: false , 
                  default: true
                }

  # Data Folder
  - label: "Authors"
    name: "authors"
    folder: "data/authors"
    create: true
    format: json
    identifier_field: "name"
    editor:
      preview: false
    fields:
      - { 
          label: "Name", 
          name: "name", 
          widget: "string", 
          required: true, 
          hint: "Enter the name for the author or contributor." 
        }
      - { 
          label: "Image", 
          name: "image", 
          widget: "image", 
          choose_url: true, 
          required: true, 
          hint: "Upload or select an image for the author or contributor." 
        }
      - { 
          label: "Bio", 
          name: "bio",
           widget: "text", 
          required: true, 
          hint: "Provide a short biography or description for the author or contributor."
        }
